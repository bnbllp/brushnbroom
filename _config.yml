# GitHub Pages configuration for brushnbroom.com
# This ensures proper static site serving and search engine optimization

# Site settings
title: Brush & Broom LLP
description: Professional residential and commercial cleaning services in Seattle and the Eastside
url: https://brushnbroom.com
domain: brushnbroom.com

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-optional-front-matter
  - jekyll-relative-links

# Exclude unnecessary files from processing
exclude:
  - .gitignore
  - README.md
  - node_modules
  - switch-index.sh

# Ensure static files are served correctly
include:
  - .htaccess

# Permalink structure
# Set to none to preserve .html extensions on GitHub Pages
permalink: none

# Disable Jekyll processing for static HTML
future: true
