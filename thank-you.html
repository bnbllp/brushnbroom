    <main>
    <section style="min-height: 70vh; display: flex; align-items: center; background: var(--cream);">
      <div class="container" style="text-align: center; padding: 80px 0;">
        <div style="width: 80px; height: 80px; background: rgba(26,60,42,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#001844" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 16px; color: var(--forest);">You&rsquo;re all set!</h1>
        <p style="font-size: 1.1rem; color: var(--charcoal-light); max-width: 560px; margin: 0 auto 32px; line-height: 1.75;">
          Thanks for reaching out to Brush &amp; Broom LLP. We&rsquo;ll review your request and get back to you within one business day to confirm the details.
        </p>
        <div style="display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;">
          <a href="/" class="btn btn-forest">Back to Home</a>
          <a href="tel:206-571-5568" class="btn btn-outline">Call Us Directly</a>
        </div>
      </div>
    </section>
  </main>

    <script>
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.nav');
    toggle.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      toggle.textContent = open ? 'Close' : 'Menu';
    });
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        nav.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.textContent = 'Menu';
      });
    });
  </script>
